llm:
  provider: deepseek
  model: deepseek-chat
  api_key: "${DEEPSEEK_API_KEY}"
  base_url: "https://api.deepseek.com"
  temperature: 0
  max_tokens: 4096

storage:
  db_path: "data/supersense.db"

sensing:
  window_sec: 1.0

agents:
  diagnosis:
    max_steps: 8
  nurse:
    threshold_hr_deviation: 10
    threshold_temp_deviation: 1.0
    observe_duration_sec: 300

web:
  host: "0.0.0.0"
  port: 8000
